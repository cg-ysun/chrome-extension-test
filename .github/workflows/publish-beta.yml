name: Publish Chrome Extension (Beta)

on:
  push:
    tags:
      - 'beta-v*.*.*'

env:
  EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID_BETA }}
  HUSKY: 0
  HOME: ${{ github.workspace }}
  NPM_TOKEN: ${{secrets.GITHUB_TOKEN}}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

permissions: {}

jobs:
  build:
    name: Build Chrome Extension (Beta)
    runs-on: arc-ent-arm
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup package managers
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build extension
        working-directory: packages/chrome-extension-test
        run: bash scripts/build-extension.sh prod-private

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrome-extension-beta-${{ github.sha }}
          path: packages/chrome-extension-test/extension-dist.zip

  upload:
    name: Upload to Chrome Web Store (Beta)
    runs-on: arc-ent-arm
    needs: build
    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: chrome-extension-beta-${{ github.sha }}

      - name: Install webstore cli
        run: npm install -g chrome-webstore-upload-cli

      - name: Upload to Chrome Web Store
        run: |-
          chrome-webstore-upload upload \
            --source extension-dist.zip \
            --extension-id ${{ env.EXTENSION_ID }} \
            --client-id ${{ secrets.CI_GOOGLE_CLIENT_ID }} \
            --client-secret ${{ secrets.CI_GOOGLE_CLIENT_SECRET }} \
            --refresh-token ${{ secrets.CI_GOOGLE_REFRESH_TOKEN }}

