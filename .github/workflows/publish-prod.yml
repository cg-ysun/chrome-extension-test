name: Publish Chrome Extension (Prod)

on:
  push:
    tags:
      - 'v*.*.*'

env:
  EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID_PROD }}

permissions: {}

jobs:
  check-beta:
    name: Verify beta tag exists
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for matching beta tag
        run: |
          # Extract version from tag (v1.2.3 -> 1.2.3)
          VERSION="${GITHUB_REF_NAME#v}"
          BETA_TAG="beta_v${VERSION}"
          if git tag --list | grep -q "^${BETA_TAG}$"; then
            echo "✅ Found matching beta tag: ${BETA_TAG}"
          else
            echo "❌ No matching beta tag found: ${BETA_TAG}"
            echo "You must publish and verify changes for beta first before publishing to prod."
            exit 1
          fi

  build:
    name: Build Chrome Extension
    runs-on: ubuntu-latest
    needs: check-beta
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tag matches manifest version
        working-directory: packages/chrome-extension-test
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          MANIFEST_VERSION=$(grep '^VITE_MANIFEST_EXTENSION_VERSION=' .env | cut -d'"' -f2)
          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "❌ Tag version ($TAG_VERSION) does not match manifest version ($MANIFEST_VERSION)"
            exit 1
          fi
          echo "✅ Tag version matches manifest version: $TAG_VERSION"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup package managers
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build extension
        working-directory: packages/chrome-extension-test
        run: bash scripts/build-extension.sh prod

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrome-extension-prod-${{ github.sha }}
          path: packages/chrome-extension-test/extension-dist.zip

  upload:
    name: Upload to Chrome Web Store
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: chrome-extension-prod-${{ github.sha }}

      - name: Install webstore cli
        run: npm install -g chrome-webstore-upload-cli

      - name: Upload to Chrome Web Store
        run: |-
          chrome-webstore-upload \
            --source extension-dist.zip \
            --extension-id ${{ env.EXTENSION_ID }} \
            --client-id ${{ secrets.CI_GOOGLE_CLIENT_ID }} \
            --client-secret ${{ secrets.CI_GOOGLE_CLIENT_SECRET }} \
            --refresh-token ${{ secrets.CI_GOOGLE_REFRESH_TOKEN }}

      - name: Notify Slack
        if: success()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "✅ Chrome Extension (Prod) submitted for review.\nTag: ${{ github.ref_name }} | Commit: ${{ github.sha }}\nReview may take hours to days. Check status in the Chrome Web Store dashboard, or the extension will auto-update once approved."
            }
