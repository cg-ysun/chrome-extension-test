name: Beta - Upload and Publish

on:
  push:
    tags:
      - 'beta-v*.*.*'

env:
  EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID_BETA }}

permissions: {}

jobs:
  build:
    name: Build Chrome Extension (Beta)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Verify release exists
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ github.ref_name }}")
          if [ "$RESPONSE" != "200" ]; then
            echo "❌ No release found for tag ${{ github.ref_name }}"
            echo "Please create a release via the GitHub UI instead of pushing a tag directly."
            exit 1
          fi
          echo "✅ Release exists for tag ${{ github.ref_name }}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tag matches manifest version
        working-directory: packages/chrome-extension-test
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#beta-v}"
          MANIFEST_VERSION=$(grep '^VITE_MANIFEST_EXTENSION_VERSION=' .env | cut -d'"' -f2)
          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "❌ Tag version ($TAG_VERSION) does not match manifest version ($MANIFEST_VERSION)"
            exit 1
          fi
          echo "✅ Tag version matches manifest version: $TAG_VERSION"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup package managers
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build extension
        working-directory: packages/chrome-extension-test
        run: bash scripts/build-extension.sh prod-private

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrome-extension-beta-${{ github.sha }}
          path: packages/chrome-extension-test/extension-dist.zip

  upload:
    name: Upload to Chrome Web Store (Beta)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: chrome-extension-beta-${{ github.sha }}

      - name: Get access token
        id: auth
        run: |
          RESPONSE=$(curl -s -X POST https://oauth2.googleapis.com/token \
            -d "client_id=${{ secrets.CI_GOOGLE_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.CI_GOOGLE_CLIENT_SECRET }}" \
            -d "refresh_token=${{ secrets.CI_GOOGLE_REFRESH_TOKEN }}" \
            -d "grant_type=refresh_token")

          ACCESS_TOKEN=$(echo "$RESPONSE" | jq -r '.access_token')
          if [ "$ACCESS_TOKEN" = "null" ] || [ -z "$ACCESS_TOKEN" ]; then
            echo "❌ Failed to get access token"
            echo "$RESPONSE" | jq .
            exit 1
          fi
          echo "::add-mask::$ACCESS_TOKEN"
          echo "access_token=$ACCESS_TOKEN" >> "$GITHUB_OUTPUT"
          echo "✅ Access token obtained"

      - name: Upload to Chrome Web Store
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://chromewebstore.googleapis.com/upload/v2/publishers/${{ secrets.CHROME_PUBLISHER_ID }}/items/${{ env.EXTENSION_ID }}:upload" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.access_token }}" \
            -H "Content-Type: application/zip" \
            -T extension-dist.zip)

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP status: $HTTP_CODE"
          echo "$BODY" | jq . 2>/dev/null || echo "$BODY"

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "❌ Upload failed with HTTP $HTTP_CODE"
            exit 1
          fi
          echo "✅ Upload successful"
        # Items are always published with the existing visibility settings.
        # If you have manually changed the settings in the Developer Dashboard,
        # you won't be able to publish using the API until you have manually published with the new visibility at least once.
      - name: Publish to trusted testers
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://chromewebstore.googleapis.com/v2/publishers/${{ secrets.CHROME_PUBLISHER_ID }}/items/${{ env.EXTENSION_ID }}:publish" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.access_token }}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP status: $HTTP_CODE"
          echo "$BODY" | jq . 2>/dev/null || echo "$BODY"

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "❌ Publish failed with HTTP $HTTP_CODE"
            exit 1
          fi
          echo "✅ Published to trusted testers"

      - name: Notify Slack
        if: success()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "✅ Chrome Extension (Beta) submitted for review.\nTag: ${{ github.ref_name }} | Commit: ${{ github.sha }}\nReview may take hours to days. Use GitHub Action to check status, or the extension will auto-update once approved."
            }

  cleanup:
    name: Cleanup release and tag on failure
    runs-on: ubuntu-latest
    needs: [build, upload]
    if: failure()
    permissions:
      contents: write
    steps:
      - name: Delete release
        run: |
          RELEASE=$(curl -s \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ github.ref_name }}")

          RELEASE_ID=$(echo "$RELEASE" | jq -r '.id // empty')
          if [ -n "$RELEASE_ID" ]; then
            curl -s -X DELETE \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID"
            echo "✅ Deleted release for ${{ github.ref_name }}"
          else
            echo "No release found for ${{ github.ref_name }}, skipping"
          fi

      - name: Delete tag
        run: |
          curl -s -X DELETE \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/git/refs/tags/${{ github.ref_name }}"
          echo "✅ Deleted tag ${{ github.ref_name }}"
