<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: Arial, sans-serif;
      color: #333;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 12px;
    }
    textarea {
      width: 100%;
      height: 120px;
      padding: 8px;
      font-size: 14px;
      font-family: inherit;
      border: 1px solid #ccc;
      border-radius: 4px;
      resize: vertical;
      box-sizing: border-box;
    }
    textarea:focus {
      outline: none;
      border-color: #4a90d9;
    }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }
    .stat {
      background: #f5f5f5;
      border-radius: 4px;
      padding: 8px;
      text-align: center;
    }
    .stat-value {
      font-size: 20px;
      font-weight: bold;
      color: #4a90d9;
    }
    .stat-label {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }
  </style>
</head>
<body>
  <h1>Word & Character Counter</h1>
  <textarea id="input" placeholder="Type or paste your text here..."></textarea>
  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="chars">0</div>
      <div class="stat-label">Characters</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="words">0</div>
      <div class="stat-label">Words</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="sentences">0</div>
      <div class="stat-label">Sentences</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="lines">0</div>
      <div class="stat-label">Lines</div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
